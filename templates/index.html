<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FANG</title>

    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <div class="container">

        <div class="header">
            <h1>FANG</h1>
            <p>
                AI-Powered Phishing Analysis & Human Risk Intelligence
            </p>
        </div>

        <div class="card">

            <textarea
                id="message"
                placeholder="Paste Email, SMS, Banking Alert, UPI Message or Suspicious Communication Here..."
            ></textarea>

            <br><br>

            <button onclick="analyzeMessage()">
                Analyze Threat
            </button>

            <div id="result"></div>

            <div id="aiExplanation"></div>

        </div>

        <!-- Challenge Banner -->

        <div class="challenge-banner">

            <h3>
                Think you can protect yourself from phishing attacks?
            </h3>

            <p>
                Test your awareness against real-world phishing scenarios
                and see whether you would fall for modern social engineering tactics.
            </p>

            <button onclick="openChallenge()">
                Launch Challenge
            </button>

        </div>

    </div>

    <!-- Challenge Modal -->

    <div id="challengeModal" class="modal">

        <div class="modal-content">

            <span class="close-btn"
                  onclick="closeChallenge()">
                &times;
            </span>

            <h2>FANG Challenge Arena</h2>

            <div class="challenge-progress">

                <span id="challengeCounter">
                    1 / 30
                </span>

            </div>

            <div id="challengeQuestionContainer">

                <p id="challengeQuestion">
                    Loading...
                </p>

            </div>

            <div id="answerButtons">

                <button
                    class="safeBtn"
                    onclick="submitAnswer('safe')">

                    SAFE

                </button>

                <button
                    class="phishingBtn"
                    onclick="submitAnswer('phishing')">

                    PHISHING

                </button>

            </div>

            <div id="challengeResult"></div>

        </div>

    </div>

    <script src="/static/script.js"></script>

</body>
</html>
